<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVP - בחירת משחק</title>
    <style>
*{-webkit-tap-highlight-color:transparent}
button,a,input,select,textarea{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
button:focus,button:focus-visible,a:focus,a:focus-visible,input:focus,select:focus,textarea:focus{outline:none}

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Assistant", "Heebo", sans-serif;
        background-color: #ff3344;
        background-image: url("redback.png");
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      #openScreen {
        position: fixed;
        inset: 0;
        background: #ff3344;
        display: grid;
        place-items: center;
        z-index: 1000;
        opacity: 1;
        transition: opacity 0.42s ease;
      }

      #openScreen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #openScreen .open-stack {
        display: grid;
        place-items: center;
        gap: 20px;
      }

      #openScreen .open-logo {
        display: block;
        width: min(92vw, 760px);
        max-height: 78vh;
        height: auto;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      #openScreen .open-progress {
        position: absolute;
        left: 50%;
        top: calc(50% + 80px);
        transform: translateX(-50%);
        display: block;
        width: min(64vw, 320px);
        height: auto;
        z-index: 3;
        user-select: none;
        -webkit-user-drag: none;
      }

      #homeTail {
        position: fixed;
        left: 0;
        bottom: max(8px, env(safe-area-inset-bottom));
        width: clamp(238px, 49vw, 459px);
        height: auto;
        z-index: 2;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .games {
        width: min(92vw, 560px);
        max-height: 70vh;
        display: grid;
        gap: 12px;
        place-items: center;
        align-content: center;
        transform: translateY(-30px);
      }

      .game-btn {
        border: 0;
        background: transparent;
        padding: 0;
        cursor: pointer;
        line-height: 0;
        -webkit-tap-highlight-color: transparent;
        tap-highlight-color: transparent;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
      }

      .game-btn:focus,
      .game-btn:focus-visible {
        outline: none;
        background: transparent;
      }

      .game-btn img {
        display: block;
        width: min(70vw, 320px);
        max-height: calc((70vh - 24px)/3);
        height: auto;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      .game-btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="openScreen" aria-label="מסך פתיחה">
      <div class="open-stack">
        <img class="open-logo" src="LOGO.svg" alt="פתיחה" />
        <img class="open-progress" src="progress.gif" alt="" aria-hidden="true" />
      </div>
    </div>

    <main class="games" aria-label="בחירת משחק">
      <button class="game-btn" onclick="location.href='coins.html'" aria-label="חפש את ההבדלים">
        <img src="butt1.png" alt="חפש את ההבדלים" />
      </button>
      <button class="game-btn" onclick="location.href='3x3puzzle.html'" aria-label="פאזל 3x3">
        <img src="butt2.png" alt="פאזל 3x3" />
      </button>
      <button class="game-btn" onclick="location.href='gameWALD.html'" aria-label="Waldo Hunt">
        <img src="butt3.png" alt="Waldo Hunt" />
      </button>
    </main>

    <img id="homeTail" src="tail2.gif" alt="" aria-hidden="true" />

    <script>
      (() => {
        const openScreen = document.getElementById("openScreen");
        if (!openScreen) return;

        const params = new URLSearchParams(window.location.search || "");
        if (params.get("home") === "1") {
          openScreen.remove();
          return;
        }

        const OPEN_SCREEN_MS = 4500;
        let closed = false;

        function closeOpenScreen() {
          if (closed) return;
          closed = true;
          openScreen.classList.add("fade-out");
          setTimeout(() => {
            openScreen.remove();
          }, 420);
        }

        const timer = setTimeout(closeOpenScreen, OPEN_SCREEN_MS);

        function closeNow() {
          clearTimeout(timer);
          closeOpenScreen();
        }

        openScreen.addEventListener("click", closeNow, { once: true });
        openScreen.addEventListener("touchend", closeNow, { once: true });
      })();
    </script>
  </body>
</html>
